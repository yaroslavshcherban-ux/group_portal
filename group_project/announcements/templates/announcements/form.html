{% extends 'announcements/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <h1>{{ title }}</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label">Заголовок</label>
                {{ form.title }}
            </div>
            <div class="mb-3">
                <label for="{{ form.content.id_for_label }}" class="form-label">Содержание</label>
                {{ form.content }}
            </div>
            <div class="mb-3">
                <label for="{{ form.category.id_for_label }}" class="form-label">Категория</label>
                {{ form.category }}
            </div>
            <div class="mb-3">
                <label for="{{ form.end_date.id_for_label }}" class="form-label">Дата окончания</label>
                {{ form.end_date }}
            </div>
            <div class="mb-3 form-check">
                {{ form.is_pinned }}
                <label for="{{ form.is_pinned.id_for_label }}" class="form-check-label">Закрепить объявление</label>
            </div>
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'announcement_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
