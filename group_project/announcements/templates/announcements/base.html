<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Шкільний портал{% endblock %}</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'announcements/css/style.css' %}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="{% url 'announcement_list' %}">
                <i class="fas fa-school me-2"></i>Шкільний портал
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    {% if user.is_authenticated %}
                        <span class="navbar-text me-3">
                            <i class="fas fa-user me-1"></i>Привіт, {{ user.username }}!
                        </span>
                        <form method="post" action="{% url 'logout' %}" style="display:inline;">
                            {% csrf_token %}
                            <button type="submit" class="nav-link btn btn-outline-primary ms-2">
                                <i class="fas fa-sign-out-alt me-1"></i>Вихід
                            </button>
                        </form>
                    {% else %}
                        <a class="nav-link btn btn-outline-primary ms-2" href="{% url 'login' %}">
                            <i class="fas fa-sign-in-alt me-1"></i>Вхід
                        </a>
                        <a class="nav-link btn btn-outline-primary ms-2" href="{% url 'register' %}">
                            <i class="fas fa-user-plus me-1"></i>Реєстрація
                        </a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer class="footer mt-auto">
        <div class="container text-center">
            <p>&copy; 2026 Шкільний портал. Всі права захищені.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></footer>
</body>
</html>
