{% extends 'announcements/base.html' %}

{% block title %}Видалити оголошення{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1>Видалити оголошення</h1>
        <p>Ви впевнені, що хочете видалити оголошення "{{ announcement.title }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Видалити</button>
            <a href="{% url 'announcement_list' %}" class="btn btn-secondary">Скасувати</a>
        </form>
    </div>
</div>
{% endblock %}
