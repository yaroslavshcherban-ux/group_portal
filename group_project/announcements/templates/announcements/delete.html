{% extends 'announcements/base.html' %}

{% block title %}Удалить объявление{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h1>Удалить объявление</h1>
        <p>Вы уверены, что хотите удалить объявление "{{ announcement.title }}"?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Удалить</button>
            <a href="{% url 'announcement_list' %}" class="btn btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
