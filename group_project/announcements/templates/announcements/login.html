{% extends 'announcements/base.html' %}

{% block title %}Вхід{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-100 bg-light">
    <div class="col-md-6 col-lg-5 p-4 shadow rounded bg-white animate__animated animate__fadeIn">
        <div class="text-center mb-4">
            <i class="fas fa-user-circle fa-3x text-primary mb-2"></i>
            <h1 class="fw-bold">Вхід</h1>
        </div>
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        <form method="post" class="needs-validation" novalidate>
            {% csrf_token %}
            <div class="mb-3">
                <label for="username" class="form-label">Ім'я користувача</label>
                <input type="text" name="username" class="form-control form-control-lg" id="username" required autofocus>
                <div class="invalid-feedback">Введіть ім'я користувача.</div>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control form-control-lg" id="password" required>
                <div class="invalid-feedback">Введіть пароль.</div>
            </div>
            <button type="submit" class="btn btn-gradient w-100 py-2 mb-2">
                <i class="fas fa-sign-in-alt me-1"></i>Увійти
            </button>
        </form>
        <p class="mt-3 text-center">
            Немає акаунта? <a href="{% url 'register' %}">Зареєструватися</a>
        </p>
    </div>
</div>
<script>
// Bootstrap validation
(function () {
  'use strict';
  var forms = document.querySelectorAll('.needs-validation');
  Array.prototype.slice.call(forms).forEach(function (form) {
    form.addEventListener('submit', function (event) {
      if (!form.checkValidity()) {
        event.preventDefault();
        event.stopPropagation();
      }
      form.classList.add('was-validated');
    }, false);
  });
})();
</script>
{% endblock %}
